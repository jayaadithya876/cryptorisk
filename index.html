<!DOCTYPE html>
<html>
<head>
<title>Crypto Risk Predictor</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}
.container{
    margin-top:60px;
}
input{
    padding:10px;
    margin:5px;
    width:140px;
}
button{
    padding:12px;
    background:orange;
    border:none;
    cursor:pointer;
}
#result{
    margin-top:20px;
    font-size:24px;
}
</style>

</head>

<body>

<div class="container">

<h1>🚀 Crypto Risk Predictor</h1>

<p>Enter BTC OHLCV Values</p>

<input id="open" placeholder="Open Price">
<input id="high" placeholder="High Price">
<input id="low" placeholder="Low Price">
<input id="close" placeholder="Close Price">
<input id="volume" placeholder="Volume">

<br><br>

<button onclick="predict()">Predict Risk</button>

<br><br>
<button onclick="fetchBTC()">Fetch Live BTC</button>
<div id="result"></div>

</div>

<script>

async function predict(){

let data = {
open: parseFloat(document.getElementById("open").value),
high: parseFloat(document.getElementById("high").value),
low: parseFloat(document.getElementById("low").value),
close: parseFloat(document.getElementById("close").value),
volume: parseFloat(document.getElementById("volume").value)
};
async function fetchBTC(){

let res = await fetch(
"https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=1"
);

let data = await res.json();

let k = data[0];

document.getElementById("open").value = parseFloat(k[1]);
document.getElementById("high").value = parseFloat(k[2]);
document.getElementById("low").value = parseFloat(k[3]);
document.getElementById("close").value = parseFloat(k[4]);
document.getElementById("volume").value = parseFloat(k[5]);

}

let res = await fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)
});

let out = await res.json();

document.getElementById("result").innerHTML =
"Prediction: " + out.prediction;

}

</script>

</body>
</html>
